<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Barroux Divine Office</title>
<style>
:root{
  --bg:#f5f1e8; --card:#fffdf7; --ink:#2b2318; --accent:#7a1f1f; --accent2:#9a6b2f;
  --muted:#8a7d68; --line:#e0d7c4; --gold:#b98c3a; --green:#3d6b3f;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;background:var(--bg);color:var(--ink);padding-bottom:110px}
header{background:linear-gradient(180deg,#3a1414,#5a1d1d);color:#f2e8d5;padding:18px 16px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{margin:0;font-size:1.05rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:#e7c979}
.datenav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px}
.datenav button{background:none;border:1px solid rgba(231,201,121,.5);color:#e7c979;border-radius:8px;font-size:1.05rem;width:38px;height:34px;cursor:pointer}
.datenav input[type=date]{background:rgba(255,255,255,.08);border:1px solid rgba(231,201,121,.4);color:#f2e8d5;border-radius:8px;padding:5px 8px;font-family:inherit;font-size:.95rem;color-scheme:dark}
#feast{margin-top:10px;font-size:1.12rem;line-height:1.35}
#feastrank{font-size:.85rem;color:#d9c194;font-style:italic;margin-top:2px}
#commem{font-size:.8rem;color:#c9b183;margin-top:3px;font-style:italic}
main{max-width:680px;margin:0 auto;padding:14px}
.notice{background:#fdf6e3;border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:.85rem;color:var(--muted);margin-bottom:12px}
.hour{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(60,40,10,.08)}
.hour .row1{display:flex;align-items:center;gap:10px}
.hour.companion{border-left:4px solid var(--gold)}
.hour h2{margin:0;font-size:1.15rem;font-weight:600;flex:1}
.hour .latin{font-size:.78rem;color:var(--muted);font-style:italic;display:block}
.hour .src{font-size:.75rem;color:var(--muted);margin-top:6px}
.hour .src select{font-family:inherit;font-size:.78rem;border:1px solid var(--line);border-radius:6px;background:#fbf7ec;color:var(--ink);padding:2px 4px;max-width:100%}
.btn{border:none;border-radius:50%;width:44px;height:44px;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn.play{background:var(--accent);color:#fff}
.btn.play.active{background:var(--green)}
.btn.txt{background:#efe6d2;color:var(--accent2);border:1px solid var(--line);border-radius:10px;width:auto;padding:0 12px;height:38px;font-size:.85rem;font-family:inherit}
.btn.dl{background:none;border:1px solid var(--line);color:var(--muted);width:38px;height:38px;font-size:.9rem;text-decoration:none}
.missing{color:var(--muted);font-size:.85rem;font-style:italic}
.playall{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-size:1rem;font-family:inherit;letter-spacing:.05em;cursor:pointer;margin-bottom:14px;box-shadow:0 2px 5px rgba(90,20,20,.3)}
#playerbar{position:fixed;left:0;right:0;bottom:0;background:#2d2114;color:#f0e6d2;padding:10px 14px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -3px 12px rgba(0,0,0,.3);display:none}
#playerbar.on{display:block}
#playerbar .info{font-size:.85rem;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
#nowplaying{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#queueinfo{color:#bda87f;flex-shrink:0}
#playerbar audio{width:100%;height:38px}
#textpanel{position:fixed;inset:0;background:rgba(20,12,5,.55);display:none;z-index:50}
#textpanel.on{display:flex;flex-direction:column}
#textpanel .sheet{background:#fff;flex:1;margin:12px;margin-top:max(12px, env(safe-area-inset-top));border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.4)}
#textpanel .bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f5efdf;border-bottom:1px solid var(--line);gap:8px}
#textpanel .bar span{font-size:.9rem;font-weight:600}
#textpanel .bar .actions{display:flex;gap:8px}
#textpanel .bar button,#textpanel .bar a{font-family:inherit;font-size:.8rem;border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--ink);text-decoration:none}
#textframe{border:none;flex:1;width:100%}
footer{max-width:680px;margin:6px auto 20px;padding:0 16px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5}
footer a{color:var(--accent2)}
@media (prefers-color-scheme: dark){
  :root{--bg:#191410;--card:#221b14;--ink:#e8dcc8;--line:#3a2f22;--muted:#a08d70}
  .notice{background:#241d13}
  .btn.txt{background:#2e2517;color:#cfa96a}
  #textpanel .sheet{background:#fff}
}
</style>
</head>
<body>
<header>
  <h1>Barroux Divine Office</h1>
  <div class="datenav">
    <button id="prev" aria-label="Previous day">&#8249;</button>
    <input type="date" id="datepick">
    <button id="next" aria-label="Next day">&#8250;</button>
    <button id="today" style="width:auto;padding:0 10px;font-size:.8rem">Today</button>
  </div>
  <div id="feast"></div>
  <div id="feastrank"></div>
  <div id="commem"></div>
</header>
<main>
  <button class="playall" id="playall">&#9654;&#xFE0E;&nbsp; Pray the Day&rsquo;s Hours in Order</button>
  <div id="hours"></div>
  <div class="notice" id="matchnote"></div>
</main>
<div id="playerbar">
  <div class="info"><span id="nowplaying"></span><span id="queueinfo"></span></div>
  <audio id="audio" controls preload="auto"></audio>
</div>
<div id="textpanel">
  <div class="sheet">
    <div class="bar">
      <span id="texttitle"></span>
      <div class="actions">
        <a id="textnewtab" target="_blank" rel="noopener">Open in tab</a>
        <button id="textclose">Close</button>
      </div>
    </div>
    <iframe id="textframe" src="about:blank"></iframe>
  </div>
</div>
<footer>
  Recordings: the monks of the <a href="https://www.barroux.org" target="_blank" rel="noopener">Abbaye Sainte-Madeleine du Barroux</a>, via <a href="https://barrouxchant.com" target="_blank" rel="noopener">barrouxchant.com</a> (2018&ndash;2022 archive).
  Texts: <a href="https://www.divinumofficium.com" target="_blank" rel="noopener">Divinum Officium</a>, Monastic &ndash; 1963 &ndash; Barroux.

</footer>

const CDN = 'https://cdn.barrouxchant.com/';
const HOURS = [
  {key:'lauds',      code:'L', en:'Lauds',    la:'Ad Laudes',       cmd:'prayLaudes'},
  {key:'prime',      code:'P', en:'Prime',    la:'Ad Primam',       cmd:'prayPrima'},
  {key:'terce',      code:'T', en:'Terce',    la:'Ad Tertiam',      cmd:'prayTertia'},
  {key:'sext',       code:'S', en:'Sext',     la:'Ad Sextam',       cmd:'praySexta'},
  {key:'none',       code:'N', en:'None',     la:'Ad Nonam',        cmd:'prayNona'},
  {key:'vespers',    code:'V', en:'Vespers',  la:'Ad Vesperas',     cmd:'prayVespera'},
  {key:'compline',   code:'C', en:'Compline', la:'Ad Completorium', cmd:'prayCompletorium'}
];
const TENEBRAE = {key:'tenebrae', code:'E', en:'Tenebrae', la:'Tenebrae', cmd:null};
const SRC_YEARS_PREF = [2022,2021,2020,2019,2018]; // preference order among source years
const DO_BASE = 'https://www.divinumofficium.com/cgi-bin/horas/Pofficium.pl';
const AUDIO_BASE = 'https://skesten.github.io/barroux-office/audio/';
const audioAvail = {};   // dateStr -> true | false | null(in flight)
const companionUrl = d => AUDIO_BASE + d + '.mp3';

function buildCompanionCard(container, dateStr) {
  const card = document.createElement('div');
  card.className = 'hour companion';
  const row = document.createElement('div');
  row.className = 'row1';
  row.innerHTML = '<h2>Martyrology &amp; Rule <span class="latin">companion reading — at Prime</span></h2>';
  const url = companionUrl(dateStr);
  if (audioAvail[dateStr] === false) {
    const m = document.createElement('span');
    m.className = 'missing'; m.textContent = 'audio not yet available';
    row.appendChild(m);
  } else {
    const pb = document.createElement('button');
    pb.className = 'btn play'; pb.innerHTML = '&#9654;&#xFE0E;'; pb.title = 'Play reading';
    pb.onclick = () => startQueue([{url, label: 'Martyrology & Rule — ' + dateStr, hourKey: 'companion'}]);
    row.appendChild(pb);
    const dl = document.createElement('a');
    dl.className = 'btn dl'; dl.href = url; dl.download = dateStr + '-reading.mp3';
    dl.innerHTML = '&#8595;'; dl.title = 'Download mp3';
    row.appendChild(dl);
  }
  const tb = document.createElement('button');
  tb.className = 'btn txt'; tb.textContent = 'Text';
  tb.onclick = () => openText('Martyrology & Rule (at Prime)', doTextUrl(dateStr, 'prayPrima'));
  row.appendChild(tb);
  card.appendChild(row);
  container.appendChild(card);
  if (audioAvail[dateStr] === undefined) {
    audioAvail[dateStr] = null;
    fetch(url, {method: 'HEAD'})
      .then(r => { audioAvail[dateStr] = r.ok; if (!r.ok) render(); })
      .catch(() => { audioAvail[dateStr] = true; });  // offline/file:// — let the player's error-skip handle it
  }
}
const DO_LANG = 'English';
const DO_VERSION = 'Monastic - 1963 - Barroux';

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const iso = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const norm = t => t.replace(/\s+/g,' ').trim().toLowerCase();
const baseTitle = t => norm(t).replace(/\s+[ivx]+\.\s+(augusti|septembris|octobris|novembris)\s*$/,'');

/* Build source-year lookup tables */
const byTitle = {}, byBase = {};
for (const [date, o] of Object.entries(ORDO)) {
  const y = +date.slice(0,4);
  if (y < 2018 || y > 2022) continue;
  const t = norm(o[0]), b = baseTitle(o[0]);
  (byTitle[t] = byTitle[t] || []).push(date);
  (byBase[b] = byBase[b] || []).push(date);
}

function candidates(dateStr) {
  const o = ORDO[dateStr];
  if (!o) return {tier:'none', dates:[]};
  const t = norm(o[0]);
  if (byTitle[t]) return {tier:'exact', dates: byTitle[t].slice()};
  const b = baseTitle(o[0]);
  if (byBase[b]) return {tier:'base', dates: byBase[b].slice()};
  // season + weekday + rank fallback
  const seasonHead = b.split(' infra ')[0];
  const out = [];
  for (const [d, so] of Object.entries(ORDO)) {
    const y = +d.slice(0,4);
    if (y < 2018 || y > 2022) continue;
    if (so[2] === o[2] && so[1] === o[1] && baseTitle(so[0]).split(' infra ')[0] === seasonHead) out.push(d);
  }
  return {tier: out.length ? 'season' : 'none', dates: out};
}

function rankCandidates(dates, hourCode, targetVespera) {
  // sort: has this hour recorded > (for vespers) matching vespera-note > complete day > preferred year
  const score = d => {
    const rec = RECORDINGS[d] || '';
    let s = 0;
    if (rec.includes(hourCode)) s += 1000;
    if (hourCode === 'V' && targetVespera !== undefined) {
      const sv = (ORDO[d]||[])[3] || '';
      if (norm(sv) === norm(targetVespera)) s += 200;
    }
    let complete = true;
    for (const h of HOURS) if (!rec.includes(h.code)) { complete = false; break; }
    if (complete) s += 100;
    s += (10 - SRC_YEARS_PREF.indexOf(+d.slice(0,4)));
    return s;
  };
  return dates.slice().sort((a,b) => score(b) - score(a));
}

function doTextUrl(dateStr, cmd) {
  const [y,m,d] = dateStr.split('-');
  const q = 'date1=' + m + '-' + d + '-' + y + '&command=' + cmd +
            '&version=' + encodeURIComponent(DO_VERSION) + '&lang2=' + encodeURIComponent(DO_LANG) + '&caller=1';
  return DO_BASE + '?' + q;
}

/* ---- state ---- */
let current = new Date();
let queue = [];       // [{url,label,hourKey}]
let qPos = -1;
const chosenSrc = {}; // hourKey -> chosen source date for the displayed day

function fmtFeast(o){ return o ? o[0] : 'No ordo data for this year'; }

function render() {
  const dateStr = iso(current);
  $('datepick').value = dateStr;
  const o = ORDO[dateStr];
  $('feast').textContent = o ? o[0] : '(no calendar data — add this year’s ordo)';
  $('feastrank').textContent = o ? (o[1] + (o[2] ? ' · ' + o[2] : '')) : '';
  $('commem').textContent = o && o[4] ? 'Commemoratio: ' + o[4] : '';

  const cands = o ? candidates(dateStr) : {tier:'none', dates:[]};
  const hoursDiv = $('hours');
  hoursDiv.innerHTML = '';
  const isSrcEra = +dateStr.slice(0,4) >= 2018 && +dateStr.slice(0,4) <= 2022;

  let hourList = HOURS.slice();
  // Tenebrae: show if any candidate (or the date itself) has it
  const anyTen = (isSrcEra ? [dateStr] : cands.dates).some(d => (RECORDINGS[d]||'').includes('E'));
  if (anyTen) hourList = [TENEBRAE, ...hourList];

  for (const h of hourList) {
    const card = document.createElement('div');
    card.className = 'hour';
    let srcDate = null, options = [];
    if (isSrcEra) {
      if ((RECORDINGS[dateStr]||'').includes(h.code)) { srcDate = dateStr; options = [dateStr]; }
    } else {
      options = rankCandidates(cands.dates, h.code, o ? o[3] : undefined)
                  .filter(d => (RECORDINGS[d]||'').includes(h.code));
      srcDate = chosenSrc[h.key] && options.includes(chosenSrc[h.key]) ? chosenSrc[h.key] : options[0] || null;
    }
    const url = srcDate ? CDN + srcDate + '-' + h.key + '.mp3' : null;
    const textUrl = h.cmd && o ? doTextUrl(dateStr, h.cmd) : null;

    const row = document.createElement('div');
    row.className = 'row1';
    row.innerHTML = '<h2>' + h.en + ' <span class="latin">' + h.la + '</span></h2>';
    if (url) {
      const pb = document.createElement('button');
      pb.className = 'btn play'; pb.innerHTML = '&#9654;&#xFE0E;'; pb.title = 'Play ' + h.en;
      pb.onclick = () => { startQueue([{url, label: h.en + ' — ' + (o?o[0]:dateStr) + ' (rec. ' + srcDate + ')', hourKey:h.key}]); };
      row.appendChild(pb);
      const dl = document.createElement('a');
      dl.className = 'btn dl'; dl.href = url; dl.download = srcDate + '-' + h.key + '.mp3';
      dl.innerHTML = '&#8595;'; dl.title = 'Download mp3';
      row.appendChild(dl);
    } else {
      const miss = document.createElement('span');
      miss.className = 'missing'; miss.textContent = 'no recording';
      row.appendChild(miss);
    }
    if (textUrl) {
      const tb = document.createElement('button');
      tb.className = 'btn txt'; tb.textContent = 'Text';
      tb.onclick = () => openText(h.en, textUrl);
      row.appendChild(tb);
    }
    card.appendChild(row);

    if (!isSrcEra && options.length > 0) {
      const src = document.createElement('div');
      src.className = 'src';
      const lab = document.createElement('span');
      lab.textContent = 'recording: ';
      src.appendChild(lab);
      const sel = document.createElement('select');
      for (const d of options) {
        const opt = document.createElement('option');
        const so = ORDO[d];
        opt.value = d;
        opt.textContent = d + (so ? ' · ' + so[0].slice(0,44) : '');
        sel.appendChild(opt);
      }
      sel.value = srcDate;
      sel.onchange = () => { chosenSrc[h.key] = sel.value; render(); };
      src.appendChild(sel);
      card.appendChild(src);
    }
    hoursDiv.appendChild(card);
    if (h.key === 'prime') buildCompanionCard(hoursDiv, dateStr);
  }

  const noteMap = {exact:'Matched by exact office title.', base:'Matched by office title (lectionary-week suffix differs).', season:'Matched by season, weekday and rank (green feria — chants are the same).', none:''};
  $('matchnote').textContent = o
    ? (isSrcEra ? 'Viewing the archive era directly — recordings are this very day’s.' :
       (noteMap[cands.tier] || '') + ' ' + cands.dates.length + ' candidate day(s) in the 2018–2022 archive.')
    : 'No ordo data embedded for this year. Ask Claude to regenerate the app with more years.';
}

/* ---- queue & player ---- */
const audio = $('audio');
function startQueue(items) {
  queue = items; qPos = -1;
  $('playerbar').classList.add('on');
  nextInQueue();
}
function nextInQueue() {
  qPos++;
  if (qPos >= queue.length) { $('queueinfo').textContent = 'finished'; return; }
  const it = queue[qPos];
  audio.src = it.url;
  audio.play().catch(()=>{});
  $('nowplaying').textContent = it.label;
  $('queueinfo').textContent = (qPos+1) + ' / ' + queue.length;
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: it.label, artist: 'Monks of Le Barroux', album: 'Divine Office'
    });
    navigator.mediaSession.setActionHandler('nexttrack', nextInQueue);
    navigator.mediaSession.setActionHandler('previoustrack', () => { qPos = Math.max(-1, qPos-2); nextInQueue(); });
  }
}
audio.addEventListener('ended', nextInQueue);
audio.addEventListener('error', () => {
  if (queue.length && qPos < queue.length) {
    $('queueinfo').textContent = 'error — skipping';
    setTimeout(nextInQueue, 1200);
  }
});

$('playall').onclick = () => {
  const dateStr = iso(current);
  const o = ORDO[dateStr];
  const isSrcEra = +dateStr.slice(0,4) >= 2018 && +dateStr.slice(0,4) <= 2022;
  const cands = o ? candidates(dateStr) : {dates:[]};
  const items = [];
  for (const h of HOURS) {
    let srcDate = null;
    if (isSrcEra) { if ((RECORDINGS[dateStr]||'').includes(h.code)) srcDate = dateStr; }
    else {
      const opts = rankCandidates(cands.dates, h.code, o ? o[3] : undefined)
                     .filter(d => (RECORDINGS[d]||'').includes(h.code));
      srcDate = chosenSrc[h.key] && opts.includes(chosenSrc[h.key]) ? chosenSrc[h.key] : opts[0] || null;
    }
    if (srcDate) items.push({url: CDN + srcDate + '-' + h.key + '.mp3', label: h.en + ' (rec. ' + srcDate + ')', hourKey: h.key});
    if (h.key === 'prime' && audioAvail[dateStr] !== false) {
      items.push({url: companionUrl(dateStr), label: 'Martyrology & Rule', hourKey: 'companion'});
    }
  }
  if (items.length) startQueue(items);
};

/* ---- text panel ---- */
function openText(title, url) {
  $('texttitle').textContent = title + ' — ' + iso(current);
  $('textframe').src = url;
  $('textnewtab').href = url;
  $('textpanel').classList.add('on');
}
$('textclose').onclick = () => { $('textpanel').classList.remove('on'); $('textframe').src = 'about:blank'; };

/* ---- date nav ---- */
function setDate(d) { current = d; for (const k in chosenSrc) delete chosenSrc[k]; render(); }
$('prev').onclick = () => setDate(new Date(current.getFullYear(), current.getMonth(), current.getDate()-1));
$('next').onclick = () => setDate(new Date(current.getFullYear(), current.getMonth(), current.getDate()+1));
$('today').onclick = () => setDate(new Date());
$('datepick').onchange = e => { const [y,m,dd] = e.target.value.split('-').map(Number); if (y) setDate(new Date(y, m-1, dd)); };

render();
</script>
</body>
